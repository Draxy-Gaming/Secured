// ── DYNAMIC COMPONENT GENERATOR PROMPT ────────────────────────────────────
const COMPONENT_GEN_PROMPT = `You are a Three.js + Arduino simulator code generator. Generate a JavaScript class for a holographic 3D electronic component.

The class MUST:
- extend ComponentInstance (already in scope)
- use THREE (Three.js r128, already in scope)
- use MAT helpers: MAT.pcb(), MAT.pcbBlue(), MAT.chip(), MAT.gold(), MAT.plastic(color), MAT.metal(), MAT.glow(color, opacity)
- have constructor(name, pos) calling super(TYPE_STRING, name, pos) then buildMesh() and buildPins()
- have buildMesh() adding Three.js meshes to this.group
- have buildPins() calling this.addPin(pinName, pinType, new THREE.Vector3(x,y,z), dir)
  pinType: 'digital','analog','power','ground','i2c_sda','i2c_scl','signal'
  dir: 'input','output','io','power','ground'
- have onPinChange(pinName, value) for signal behavior
- have getProperties() returning plain object {type, name, ...status fields}
- have updateGlow() method (can be empty)
- have tick(dt) method (can be empty, or animate things)

For display components (OLED, TFT, LCD): use canvas texture on a PlaneGeometry or BoxGeometry.
Make meshes look good and recognizable. Use colored materials that suggest the real component.
Scale: real world ~1cm = 0.3 three.js units. Keep components compact.

RESPOND ONLY WITH: a single self-contained JavaScript class, no imports, no exports, no markdown.
Start directly with: class ComponentClass extends ComponentInstance {`;

// Registry for dynamically created component classes
const dynamicComponents = {};

async function generateAndRegisterComponent(typeId, displayName, description) {
  if (dynamicComponents[typeId]) return dynamicComponents[typeId]; // already generated

  aiLog(`⚙ Generating "${displayName}" component...`, 'system');

  const prompt = `Create a 3D holographic component for: ${displayName}
Description: ${description}
Type string to use in super(): "${typeId}"
Class name to use: ${typeId.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join('')}Component

${COMPONENT_GEN_PROMPT}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 3000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) throw new Error('API '+res.status);
    const data = await res.json();
    let code = data.content[0].text.trim();

    // Strip markdown if present
    code = code.replace(/^```(?:javascript|js)?\n?/,'').replace(/\n?```$/,'').trim();
    if (!code.startsWith('class ')) throw new Error('Bad class output');

    // Extract class name
    const classNameMatch = code.match(/^class\s+(\w+)/);
    if (!classNameMatch) throw new Error('No class name found');
    const className = classNameMatch[1];

    // Eval the class in scope of THREE, MAT, ComponentInstance
    const factory = new Function('THREE','MAT','ComponentInstance', code + `\nreturn ${className};`);
    const ComponentClass = factory(THREE, MAT, ComponentInstance);

    // Register
    dynamicComponents[typeId] = ComponentClass;

    // Add to component library for the sidebar
    if (!COMPONENT_LIBRARY.find(c=>c.type===typeId)) {
      COMPONENT_LIBRARY.push({ type: typeId, name: displayName, category: 'Generated', icon: '⚡' });
      rebuildSidebar();
    }

    aiLog(`✓ "${displayName}" component created and registered!`, 'system');
    return ComponentClass;

  } catch(e) {
    aiLog(`✗ Component generation failed: ${e.message}`, 'system');
    return null;
  }
}

function rebuildSidebar() {
  const list = document.getElementById('comp-list');
  if (!list) return;
  list.innerHTML = '';
  let lastCat = '';
  for (const def of COMPONENT_LIBRARY) {
    const cat = def.category || 'Basic';
    if (cat !== lastCat) {
      const hdr = document.createElement('div');
      hdr.className = 'comp-category';
      hdr.textContent = cat.toUpperCase();
      list.appendChild(hdr);
      lastCat = cat;
    }
    const item = document.createElement('div');
    item.className = 'comp-item';
    item.innerHTML = `<span class="comp-icon">${def.icon||'◈'}</span>${def.name}`;
    item.onclick = () => addComponentFromLibrary(def.type);
    list.appendChild(item);
  }
}

function findCompByName(name) {
  for (const comp of components.values()) {
    if (comp.name.toLowerCase() === name.toLowerCase()) return comp;
  }
  return null;
}

async function executeAction(action) {
  switch(action.action) {
    case 'add': {
      const pos = { x: action.position?.x||0, y:0, z: action.position?.z||0 };
      // Check if it's a dynamic component
      if (dynamicComponents[action.type]) {
        const CompClass = dynamicComponents[action.type];
        const name = action.name || action.type + '_' + Date.now();
        const comp = new CompClass(name, new THREE.Vector3(pos.x, 0, pos.z));
        comp.group.position.set(pos.x, 0, pos.z);
        scene.add(comp.group);
        components.set(comp.id, comp);
        selectComponent(comp);
        break;
      }
      const comp = createComponent(action.type, pos, { name:action.name, ledColor:action.ledColor });
      if (comp && comp.simulator) comp.simulator.serialCallback = (t)=>serialLog(t);
      break;
    }
    case 'create_component': {
      const typeId = action.componentType || action.type;
      const displayName = action.displayName || typeId;
      const description = action.description || displayName;
      const CompClass = await generateAndRegisterComponent(typeId, displayName, description);
      if (CompClass && action.position) {
        const pos = action.position;
        const name = action.name || displayName.replace(/\s+/g,'_') + '_1';
        const comp = new CompClass(name, new THREE.Vector3(pos.x||0, 0, pos.z||0));
        comp.group.position.set(pos.x||0, 0, pos.z||0);
        scene.add(comp.group);
        components.set(comp.id, comp);
        selectComponent(comp);
      }
      break;
    }
    case 'connect': {
      const c1 = findCompByName(action.from.name);
      const c2 = findCompByName(action.to.name);
      if (!c1) { aiLog('Component not found: '+action.from.name, 'system'); break; }
      if (!c2) { aiLog('Component not found: '+action.to.name, 'system'); break; }
      const ok = connectPins(c1, action.from.pin, c2, action.to.pin);
      if (!ok) aiLog(`Pin not found: ${action.from.pin} or ${action.to.pin}`, 'system');
      break;
    }
    case 'upload': {
      const comp = findCompByName(action.target);
      if (!comp || !comp.simulator) { aiLog('No board: '+action.target, 'system'); break; }
      comp.state.code = action.code;
      comp.simulator.serialCallback = (t)=>serialLog(t);
      document.getElementById('editor').value = action.code;
      selectComponent(comp);
      switchTab('serial');
      serialLog('--- Uploading to '+comp.name+' ---','info');
      const ok = comp.simulator.upload(action.code);
      if (ok) { simRunning=true; updateStatusDot('running'); document.getElementById('btn-run').classList.add('active'); }
      break;
    }
    case 'message': {
      aiLog(action.text, 'ai');
      break;
    }
    case 'sequence': {
      for (const step of (action.steps||[])) {
        await executeAction(step);
        await new Promise(r=>setTimeout(r, 150));
      }
      break;
    }
  }
}

function aiLog(text, type='ai') {
  const log = document.getElementById('ai-log');
  const div = document.createElement('div');
  div.className = 'ai-msg '+type;
  div.textContent = (type==='user'?'> ':'JARVIS: ') + text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function sendAICommand() {
  const input = document.getElementById('ai-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  
  aiLog(text, 'user');
  
  // Build context about current components
  let context = '\n\nCurrently in scene: ';
  if (components.size === 0) {
    context += 'empty lab';
  } else {
    context += [...components.values()].map(c=>`${c.name}(${c.type})`).join(', ');
  }
  
  document.getElementById('thinking-indicator').style.display = 'block';
  
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        system: AI_SYSTEM_PROMPT,
        messages: [{ role:'user', content: text + context }]
      })
    });
    
    document.getElementById('thinking-indicator').style.display = 'none';
    
    if (!res.ok) throw new Error('API error '+res.status);
    const data = await res.json();
    const raw = data.content[0].text.trim();
    
    // Parse JSON
    try {
      let jsonStr = raw;
      // Strip markdown code blocks if present
      jsonStr = jsonStr.replace(/^```json\n?/,'').replace(/\n?```$/,'').trim();
      const parsed = JSON.parse(jsonStr);
      
      // Show message summary to user
      if (parsed.action === 'message') {
        aiLog(parsed.text, 'ai');
      } else if (parsed.action === 'sequence') {
        const types = [...new Set(parsed.steps.map(s=>s.action))];
        aiLog(`Executing sequence: ${parsed.steps.length} steps (${types.join(', ')})`, 'ai');
      } else {
        aiLog(`Executing: ${parsed.action}`, 'ai');
      }
      
      await executeAction(parsed);
      
    } catch(parseErr) {
      // Not JSON — display as message
      aiLog(raw, 'ai');
    }
    
  } catch(err) {
    document.getElementById('thinking-indicator').style.display = 'none';
    aiLog('Error: '+err.message, 'system');
  }
}

function aiInputKey(e) {
  if (e.key === 'Enter') sendAICommand();
}

// ── WIRE PREVIEW ON MOUSE MOVE (for active connection) ────────────────────
let wireLine = null;
function updateWirePreview(e) {
  if (!connectingPin) {
    if (wireLine) { scene.remove(wireLine); wireLine=null; }
    document.getElementById('wire-cursor').style.display = 'none';
    return;
  }
  // Update floating cursor dot
  const wc = document.getElementById('wire-cursor');
  wc.style.display = 'block';
  wc.style.left = e.clientX+'px';
  wc.style.top = e.clientY+'px';
  
  // Build preview wire line
  const gpt = raycastGround(e);
  const startPos = connectingPin.worldPos();
  const endPos = gpt.clone().setY(0.5);
  const mid = new THREE.Vector3().lerpVectors(startPos, endPos, 0.5);
  mid.y += 1.5;
  const curve = new THREE.CatmullRomCurve3([startPos, mid, endPos]);
  const pts = curve.getPoints(20);
  if (wireLine) scene.remove(wireLine);
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({color:0xff8800, transparent:true, opacity:0.7});
  wireLine = new THREE.Line(geo, mat);
  scene.add(wireLine);
}
canvas.addEventListener('mousemove', updateWirePreview);

// ── PARTICLE ANIMATION ────────────────────────────────────────────────────
let pTime = 0;
function animateParticles(dt) {
  pTime += dt;
  const pos = particleGeo.attributes.position.array;
  for (let i=0; i<pCount; i++) {
    pos[i*3+1] += 0.01 * Math.sin(pTime + i * 0.5);
    if (pos[i*3+1] > 30) pos[i*3+1] = 0;
  }
  particleGeo.attributes.position.needsUpdate = true;
  particleMat.opacity = 0.3 + 0.1 * Math.sin(pTime * 0.5);
}

// ── LIVE SENSOR PANEL ─────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════
// DRAGGABLE TEST SUBJECT — a physical object you move in 3D to test sensors
// ══════════════════════════════════════════════════════════════════════════
class TestSubject {
  constructor() {
    this.group = new THREE.Group();
    this.group.position.set(8, 0, 0);
    this.active = false;
    this.isDragging = false;

    // Glowing cube body
    const geo = new THREE.BoxGeometry(1.4, 1.4, 1.4);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xff6600, emissive: 0xff3300, emissiveIntensity: 0.6,
      transparent: true, opacity: 0.92, roughness: 0.2, metalness: 0.3
    });
    this.mesh = new THREE.Mesh(geo, mat);
    this.group.add(this.mesh);

    // Outer glow shell
    const glowGeo = new THREE.BoxGeometry(1.9, 1.9, 1.9);
    const glowMat = new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.12, side: THREE.BackSide });
    this.glowMesh = new THREE.Mesh(glowGeo, glowMat);
    this.group.add(this.glowMesh);

    // Point light
    this.light = new THREE.PointLight(0xff6600, 1.2, 10);
    this.light.position.y = 1;
    this.group.add(this.light);

    // Label ring (wireframe outline)
    const edgeGeo = new THREE.EdgesGeometry(geo);
    const edgeMat = new THREE.LineBasicMaterial({ color: 0xff8844, transparent: true, opacity: 0.8 });
    this.edges = new THREE.LineSegments(edgeGeo, edgeMat);
    this.group.add(this.edges);

    // "TEST" label plane — pulse rings
    for (let i = 0; i < 3; i++) {
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.8 + i*0.4, 0.9 + i*0.4, 16),
        new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.15 - i*0.04, side: THREE.DoubleSide })
      );
      ring.rotation.x = -Math.PI/2;
      ring.position.y = -0.7;
      ring.userData.ringIndex = i;
      this.group.add(ring);
    }

    scene.add(this.group);
    this.group.userData.isTestSubject = true;
    this.group.userData.testSubjectRef = this;

    // Add draggable mesh userData
    this.mesh.userData.isTestSubjectMesh = true;
    this.mesh.userData.testSubjectRef = this;
  }

  setDragging(v) {
    this.isDragging = v;
    this.mesh.material.emissiveIntensity = v ? 1.2 : 0.6;
    this.glowMesh.material.opacity = v ? 0.3 : 0.12;
    this.light.intensity = v ? 2.5 : 1.2;
  }

  tick(t) {
    // Hover float animation
    this.mesh.position.y = 0.7 + Math.sin(t * 1.8) * 0.15;
    this.glowMesh.position.y = this.mesh.position.y;
    this.edges.position.y   = this.mesh.position.y;
    this.mesh.rotation.y    = t * 0.5;
    this.edges.rotation.y   = t * 0.5;

    // Pulse rings
    this.group.children.forEach(c => {
      if (c.userData.ringIndex !== undefined) {
        const phase = t * 2 + c.userData.ringIndex * 1.0;
        c.material.opacity = 0.06 + 0.08 * Math.abs(Math.sin(phase));
        const s = 1 + 0.08 * Math.sin(phase * 1.3);
        c.scale.setScalar(s);
      }
    });

    // Update all sensors based on distance to this test subject
    const pos = this.group.position;
    for (const comp of components.values()) {
      if (comp.type === 'ultrasonic') {
        const dx = pos.x - comp.group.position.x;
        const dz = pos.z - comp.group.position.z;
        const dist3d = Math.sqrt(dx*dx + dz*dz);
        // 1 three.js unit = ~5 cm, capped at 400cm
        comp.distance = Math.max(2, Math.min(400, dist3d * 5));
      }
    }
  }

  worldPos() { return this.group.position.clone(); }
  remove() { scene.remove(this.group); }
}

// Create the test subject (hidden until toggled)
let testSubject = null;
let isDraggingTestSubject = false;

function spawnTestSubject() {
  if (testSubject) { testSubject.remove(); testSubject = null; return; }
  testSubject = new TestSubject();
  showToast('Test object spawned — drag it near sensors!', 2500);
}

// ── SENSOR PANEL ──────────────────────────────────────────────────────────
function getSensorReadings() {
  const readings = [];
  for (const comp of components.values()) {
    if (comp.type === 'dht11') {
      readings.push({ id: comp.id+'_temp', name: comp.name, label:'Temperature',
        value: comp.readTemperature().toFixed(1), unit:'°C', pct:(comp.temperature+10)/90,
        comp, slider:{ min:-10, max:80, step:0.5, get:()=>comp.temperature, set:v=>comp.temperature=v } });
      readings.push({ id: comp.id+'_hum', name: comp.name, label:'Humidity',
        value: comp.readHumidity().toFixed(1), unit:'%', pct:comp.humidity/100,
        comp, slider:{ min:0, max:100, step:1, get:()=>comp.humidity, set:v=>comp.humidity=v } });
    }
    if (comp.type === 'ultrasonic') {
      const d = comp.measureDistance();
      readings.push({ id: comp.id+'_dist', name: comp.name, label:'Distance',
        value: d.toFixed(1), unit:'cm', pct:Math.min(1, d/400), comp,
        slider:{ min:2, max:400, step:1, get:()=>comp.distance, set:v=>comp.distance=v },
        hint: testSubject ? '📦 Drag test object to change' : null });
    }
    if (comp.type === 'potentiometer') {
      readings.push({ id: comp.id+'_pot', name: comp.name, label:'Position',
        value: (comp.value*100).toFixed(0), unit:'%', pct:comp.value,
        comp, slider:{ min:0, max:100, step:1, get:()=>comp.value*100, set:v=>comp.setValue(v/100) } });
    }
    if (comp.type === 'led') {
      const v = comp.state.brightness||0;
      readings.push({ id: comp.id+'_led', name: comp.name, label:'LED',
        value: v>0.01?'ON':'OFF', unit:(v*100).toFixed(0)+'%', pct:v, comp, digital:true, on:v>0.01 });
    }
    if (comp.type === 'button') {
      readings.push({ id: comp.id+'_btn', name: comp.name, label:'Button',
        value: comp.pressed?'PRESSED':'OPEN', unit:'', pct:comp.pressed?1:0,
        comp, digital:true, on:comp.pressed, pressable:true });
    }
    if (comp.type === 'servo') {
      readings.push({ id: comp.id+'_servo', name: comp.name, label:'Angle',
        value: comp.angle.toFixed(0), unit:'°', pct:comp.angle/180,
        comp, slider:{ min:0, max:180, step:1, get:()=>comp.angle, set:v=>comp.targetAngle=v } });
    }
    if (comp.type === 'arduino_uno' || comp.type === 'esp32') {
      for (const [pname, pin] of Object.entries(comp.pins)) {
        if (pin.connections.length > 0 && pin.value > 0) {
          readings.push({ id: comp.id+'_'+pname, name: comp.name, label: pname,
            value: pin.type==='analog'?(pin.value*1023).toFixed(0):(pin.value>0.5?'HIGH':'LOW'),
            unit: pin.type==='analog'?'/1023':'', pct:pin.value,
            comp, digital:pin.type==='digital', on:pin.value>0.5 });
        }
      }
    }
  }
  return readings;
}

let sensorPanelOpen = false;
function renderSensorPanel() { sensorPanelOpen = true; updateSensorPanel(); }

function updateSensorPanel() {
  if (!sensorPanelOpen) return;
  const panel = document.getElementById('sensor-panel');
  if (!panel || panel.style.display === 'none') return;

  const readings = getSensorReadings();

  // Header with spawn button
  const spawnBtnHtml = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">
    <span style="font-size:9px;letter-spacing:2px;color:var(--text2)">LIVE SENSOR MONITOR</span>
    <button onclick="spawnTestSubject()" style="background:${testSubject?'rgba(255,102,0,0.25)':'rgba(0,212,255,0.1)'};border:1px solid ${testSubject?'#ff6600':'var(--border)'};
      color:${testSubject?'#ff8844':'var(--c)'};font-family:var(--font);font-size:8px;letter-spacing:2px;padding:5px 12px;cursor:pointer;transition:all .2s">
      ${testSubject ? '🟠 REMOVE OBJECT' : '📦 SPAWN TEST OBJECT'}
    </button>
  </div>`;

  if (readings.length === 0) {
    panel.innerHTML = spawnBtnHtml + `<div class="sensor-empty">No active sensors found. Add components and connect them.</div>`;
    return;
  }

  const existing = panel.querySelector('.sensor-grid');
  const ids = readings.map(r=>r.id);
  const needsRebuild = !existing || existing.dataset.ids !== ids.join(',');

  if (needsRebuild) {
    panel.innerHTML = spawnBtnHtml +
      '<div class="sensor-grid" data-ids="'+ids.join(',')+'">'+
      readings.map(r => buildSensorCard(r)).join('') + '</div>';

    for (const r of readings) {
      if (r.slider) {
        const sl = panel.querySelector(`#sl_${r.id}`);
        if (sl) sl.addEventListener('input', e => r.slider.set(parseFloat(e.target.value)));
      }
      if (r.pressable) {
        const btn = panel.querySelector(`#pb_${r.id}`);
        if (btn) {
          btn.addEventListener('mousedown',  () => r.comp.setPressed(true));
          btn.addEventListener('mouseup',    () => r.comp.setPressed(false));
          btn.addEventListener('mouseleave', () => r.comp.setPressed(false));
          btn.addEventListener('touchstart', e  => { e.preventDefault(); r.comp.setPressed(true); });
          btn.addEventListener('touchend',   ()  => r.comp.setPressed(false));
        }
      }
    }
  } else {
    // Soft update — just refresh numbers, keep sliders alone
    const hdr = panel.querySelector('button[onclick="spawnTestSubject()"]');
    if (hdr) {
      hdr.style.background = testSubject ? 'rgba(255,102,0,0.25)' : 'rgba(0,212,255,0.1)';
      hdr.style.borderColor = testSubject ? '#ff6600' : 'var(--border)';
      hdr.style.color = testSubject ? '#ff8844' : 'var(--c)';
      hdr.textContent = testSubject ? '🟠 REMOVE OBJECT' : '📦 SPAWN TEST OBJECT';
    }
    for (const r of readings) {
      const valEl  = panel.querySelector(`#val_${r.id}`);
      const barEl  = panel.querySelector(`#bar_${r.id}`);
      const cardEl = panel.querySelector(`#card_${r.id}`);
      const pct    = Math.max(0, Math.min(1, r.pct||0)) * 100;
      if (valEl)  valEl.textContent = r.value + (r.unit && !r.digital ? ' '+r.unit : '');
      if (barEl)  { barEl.style.width = pct+'%'; barEl.className = 'sensor-bar-fill'+(pct>80?' high':''); }
      if (cardEl) cardEl.className = 'sensor-card'+(r.digital&&r.on?' active':'');
      if (r.slider) {
        const sl = panel.querySelector(`#sl_${r.id}`);
        if (sl && document.activeElement !== sl) sl.value = r.slider.get();
      }
    }
  }
}

function buildSensorCard(r) {
  const pct = Math.max(0, Math.min(1, r.pct||0)) * 100;
  const cardClass = 'sensor-card'+(r.digital&&r.on?' active':'');
  let controls = '';
  if (r.slider) {
    const s = r.slider;
    controls += `<div class="sensor-slider-row">
      <input id="sl_${r.id}" type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.get()}" class="sensor-slider">
      <span class="slider-range">${s.min}–${s.max}</span></div>`;
  }
  if (r.hint) controls += `<div style="font-size:8px;color:var(--ca);margin-top:3px">${r.hint}</div>`;
  if (r.pressable) controls += `<button id="pb_${r.id}" class="sensor-ctrl-btn press-btn">HOLD TO PRESS</button>`;

  return `<div id="card_${r.id}" class="${cardClass}">
    <div class="sensor-name">${r.name} <span style="color:var(--c2)">${r.label}</span></div>
    <div id="val_${r.id}" class="sensor-value">${r.value}${r.unit&&!r.digital?' '+r.unit:''}</div>
    <div class="sensor-bar"><div id="bar_${r.id}" class="sensor-bar-fill${pct>80?' high':''}" style="width:${pct}%"></div></div>
    ${controls}</div>`;
}

let lastTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  
  // FPS counter
  frameCount++;
  if (now - lastFpsTime > 1000) {
    document.getElementById('fps-counter').textContent = frameCount+'fps';
    frameCount = 0; lastFpsTime = now;
  }
  
  // Animate particles
  animateParticles(dt);
  
  // Rotate point lights
  const t = now * 0.001;
  pointLight1.position.x = Math.cos(t * 0.3) * 15;
  pointLight1.position.z = Math.sin(t * 0.3) * 12;
  
  // Tick test subject every frame (independent of sim state)
  if (testSubject) testSubject.tick(t);

  // Tick simulation
  if (simRunning) {
    for (const comp of components.values()) {
      comp.tick(dt);
    }
    // Update wire visual activity
    for (const wire of wires.values()) {
      // Animate emissive based on signal
      const v = Math.max(wire.pinA.value, wire.pinB.value);
      if (wire.mesh) {
        wire.mesh.material.emissiveIntensity = 0.2 + v*0.7 + 0.1*Math.sin(t*8 + wire.id.charCodeAt(0));
      }
    }
    // Update properties if selected
    if (selectedComp && frameCount % 30 === 0) {
      updatePropertiesPanel(selectedComp);
    }
  }
  
  // Update sensor panel every ~20 frames
  if (frameCount % 20 === 0) updateSensorPanel();

  renderer.render(scene, camera);
}
animate();
