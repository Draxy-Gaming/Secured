<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J.A.R.V.I.S — Holographic Electronics Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --c:#00d4ff;--c2:#0070ff;--ca:#ff6b00;--cg:#00ff88;
  --bg:#020810;--panel:rgba(2,15,40,0.92);--border:rgba(0,212,255,0.25);
  --text:#b0e0ff;--text2:#6090c0;
  --font:'Orbitron',monospace;--mono:'Share Tech Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text);}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;}
#scanlines{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.012) 2px,rgba(0,212,255,0.012) 4px);}

/* TOP BAR */
#topbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:100;display:flex;align-items:center;padding:0 20px;
  background:linear-gradient(180deg,rgba(0,20,50,0.95) 0%,rgba(0,10,30,0.6) 100%);
  border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}
#logo{font-size:18px;font-weight:900;letter-spacing:6px;
  background:linear-gradient(90deg,#00d4ff,#0070ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#subtitle{font-size:9px;letter-spacing:3px;color:var(--text2);margin-left:14px;margin-top:2px;font-weight:400;}
#sim-controls{display:flex;gap:8px;margin-left:auto;align-items:center;}
.ctrl-btn{background:var(--panel);border:1px solid var(--border);color:var(--c);
  padding:7px 16px;font-family:var(--font);font-size:10px;letter-spacing:2px;cursor:pointer;
  transition:all .2s;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
.ctrl-btn:hover{background:rgba(0,212,255,0.15);border-color:var(--c);box-shadow:0 0 12px rgba(0,212,255,0.3);}
.ctrl-btn.active{background:rgba(0,212,255,0.2);border-color:var(--c);color:#fff;}
.ctrl-btn.danger{border-color:rgba(255,107,0,0.5);color:var(--ca);}
.ctrl-btn.danger:hover{background:rgba(255,107,0,0.15);}
#status-dot{width:8px;height:8px;border-radius:50%;background:#333;margin-left:16px;transition:all .3s;}
#status-dot.running{background:var(--cg);box-shadow:0 0 10px var(--cg);animation:pulse 1s infinite;}
#status-dot.error{background:#ff3040;box-shadow:0 0 10px #ff3040;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
#fps-counter{font-size:9px;color:var(--text2);margin-left:10px;font-family:var(--mono);}

/* LEFT PANEL — Component Library */
#left-panel{position:fixed;left:0;top:52px;bottom:0;width:200px;z-index:100;
  background:var(--panel);border-right:1px solid var(--border);backdrop-filter:blur(12px);
  display:flex;flex-direction:column;overflow:hidden;transition:transform .3s;}
#left-panel.collapsed{transform:translateX(-160px);}
#panel-title{padding:14px 16px 10px;font-size:9px;letter-spacing:3px;color:var(--text2);
  border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.panel-toggle{background:none;border:none;color:var(--c);cursor:pointer;font-size:14px;}
#comp-list{flex:1;overflow-y:auto;padding:8px;}
#comp-list::-webkit-scrollbar{width:3px;}
#comp-list::-webkit-scrollbar-track{background:transparent;}
#comp-list::-webkit-scrollbar-thumb{background:var(--border);}
.comp-item{display:flex;align-items:center;gap:10px;padding:9px 10px;margin-bottom:4px;cursor:pointer;
  border:1px solid transparent;transition:all .2s;border-radius:2px;}
.comp-item:hover{border-color:var(--border);background:rgba(0,212,255,0.06);}
.comp-item:active{background:rgba(0,212,255,0.12);}
.comp-icon{width:32px;height:32px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:15px;background:rgba(0,20,50,0.5);flex-shrink:0;}
.comp-info{flex:1;}
.comp-name{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--text);}
.comp-sub{font-size:8px;color:var(--text2);margin-top:2px;font-family:var(--mono);}

/* RIGHT PANEL — Code/Properties */
#right-panel{position:fixed;right:0;top:52px;bottom:0;width:300px;z-index:100;
  background:var(--panel);border-left:1px solid var(--border);backdrop-filter:blur(12px);
  display:flex;flex-direction:column;overflow:hidden;transition:transform .3s;}
#right-panel.collapsed{transform:translateX(260px);}
#prop-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
#prop-title{font-size:10px;letter-spacing:2px;color:var(--c);}
#code-section{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#code-toolbar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;}
#code-toolbar span{font-size:9px;letter-spacing:2px;color:var(--text2);}
#editor{flex:1;background:transparent;border:none;resize:none;
  color:#a0e0b0;font-family:var(--mono);font-size:12px;line-height:1.6;
  padding:12px;outline:none;overflow-y:auto;}
#editor::-webkit-scrollbar{width:3px;}
#editor::-webkit-scrollbar-thumb{background:var(--border);}
#upload-btn{margin:10px 12px;padding:10px;background:rgba(0,100,255,0.15);border:1px solid rgba(0,100,255,0.4);
  color:#60a0ff;font-family:var(--font);font-size:9px;letter-spacing:3px;cursor:pointer;transition:all .2s;text-align:center;}
#upload-btn:hover{background:rgba(0,100,255,0.25);border-color:var(--c2);}
#prop-section{padding:10px 12px;border-top:1px solid var(--border);max-height:160px;overflow-y:auto;}
.prop-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(0,212,255,0.07);}
.prop-key{font-size:9px;color:var(--text2);}
.prop-val{font-size:9px;color:var(--cg);font-family:var(--mono);}

/* BOTTOM — Serial Monitor + AI */
#bottom-panel{
  position:fixed;bottom:0;left:200px;right:300px;
  height:200px;min-height:120px;max-height:60vh;
  z-index:100;
  background:var(--panel);border-top:1px solid var(--border);backdrop-filter:blur(12px);
  display:flex;flex-direction:column;
  transition:left .3s, right .3s;
}
#bottom-panel.left-collapsed{left:40px;}
#bottom-panel.right-collapsed{right:40px;}

/* Resize handle */
#bottom-resize{
  height:5px;cursor:ns-resize;
  background:linear-gradient(var(--border),transparent);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
#bottom-resize::after{
  content:'';display:block;
  width:40px;height:2px;border-radius:2px;
  background:var(--border);
}
#bottom-resize:hover::after{background:var(--c);}

#bottom-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;
  align-items:center;}
.btab{padding:8px 16px;font-size:9px;letter-spacing:2px;cursor:pointer;color:var(--text2);
  border-bottom:2px solid transparent;transition:all .2s;flex-shrink:0;}
.btab.active{color:var(--c);border-bottom-color:var(--c);}
#bottom-collapse-btn{margin-left:auto;margin-right:10px;background:none;border:none;
  color:var(--text2);cursor:pointer;font-size:12px;padding:4px 8px;transition:color .2s;}
#bottom-collapse-btn:hover{color:var(--c);}

#serial-monitor{flex:1;overflow-y:auto;padding:8px 12px;font-family:var(--mono);font-size:11px;color:#80d080;
  display:none;min-height:0;}
#serial-monitor.active{display:block;}
#serial-monitor::-webkit-scrollbar{width:3px;}
#serial-monitor::-webkit-scrollbar-thumb{background:var(--border);}
.serial-line{padding:1px 0;white-space:pre-wrap;}
.serial-line.error{color:#ff6060;}
.serial-line.info{color:#6090ff;}

/* FIXED: removed duplicate display property */
#ai-console{display:none;flex-direction:column;flex:1;min-height:0;}
#ai-console.active{display:flex;}
#ai-log{flex:1;overflow-y:auto;padding:8px 12px;font-size:11px;min-height:0;}
#ai-log::-webkit-scrollbar{width:3px;}
#ai-log::-webkit-scrollbar-thumb{background:var(--border);}
.ai-msg{padding:4px 0;border-bottom:1px solid rgba(0,212,255,0.06);}
.ai-msg.user{color:#80b0ff;font-family:var(--mono);}
.ai-msg.ai{color:var(--c);}
.ai-msg.system{color:var(--text2);font-size:10px;font-style:italic;}
#thinking-indicator{display:none;color:var(--c2);font-size:10px;padding:2px 12px;flex-shrink:0;animation:thinking 1.5s infinite;}
@keyframes thinking{0%,100%{opacity:0.4;}50%{opacity:1;}}
/* KEY FIX: input row must never shrink away */
#ai-input-row{display:flex;padding:8px 12px;gap:8px;border-top:1px solid var(--border);
  flex-shrink:0;background:rgba(2,10,30,0.6);}
#ai-input{flex:1;background:rgba(0,20,50,0.7);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:11px;padding:8px 10px;outline:none;min-width:0;}
#ai-input:focus{border-color:var(--c);background:rgba(0,20,60,0.9);}
#ai-input::placeholder{color:var(--text2);}
#ai-send{background:rgba(0,212,255,0.15);border:1px solid var(--border);color:var(--c);
  font-family:var(--font);font-size:9px;letter-spacing:2px;padding:8px 14px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:all .2s;}
#ai-send:hover{background:rgba(0,212,255,0.3);border-color:var(--c);}
#ai-send:active{background:rgba(0,212,255,0.5);}

/* ON-SCREEN NAV CONTROLS (trackpad friendly) */
#nav-controls{
  position:fixed;right:308px;bottom:210px;z-index:101;
  display:flex;flex-direction:column;gap:4px;align-items:center;
  transition:right .3s, bottom .3s;
}
.nav-group{display:flex;gap:4px;}
.nav-btn{
  width:34px;height:34px;
  background:rgba(0,20,50,0.85);border:1px solid var(--border);
  color:var(--c);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;border-radius:3px;
  user-select:none;-webkit-user-select:none;
}
.nav-btn:hover{background:rgba(0,212,255,0.2);border-color:var(--c);}
.nav-btn:active{background:rgba(0,212,255,0.4);transform:scale(0.92);}
.nav-btn.nav-label{font-size:7px;letter-spacing:1px;width:auto;padding:0 8px;color:var(--text2);}
#nav-hint{
  position:fixed;right:308px;bottom:205px;z-index:101;
  font-size:8px;letter-spacing:1px;color:var(--text2);text-align:center;
  pointer-events:none;line-height:1.6;
}

/* SENSOR MONITOR */
#sensor-panel::-webkit-scrollbar{width:3px;}
#sensor-panel::-webkit-scrollbar-thumb{background:var(--border);}
.sensor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;padding:4px 0;}
.sensor-card{background:rgba(0,20,50,0.7);border:1px solid var(--border);padding:10px 12px;border-radius:2px;transition:border-color .2s;}
.sensor-card.active{border-color:var(--cg);}
.sensor-card.error-state{border-color:var(--ca);}
.sensor-name{font-size:8px;letter-spacing:2px;color:var(--text2);margin-bottom:4px;}
.sensor-value{font-size:22px;font-family:var(--mono);color:var(--cg);line-height:1;margin-bottom:4px;}
.sensor-bar{height:3px;background:rgba(0,212,255,0.1);border-radius:2px;margin-bottom:7px;overflow:hidden;}
.sensor-bar-fill{height:100%;background:var(--cg);transition:width .15s;border-radius:2px;}
.sensor-bar-fill.high{background:var(--ca);}
.sensor-empty{color:var(--text2);font-size:10px;font-style:italic;padding:16px 0;text-align:center;line-height:2;}
/* Slider */
.sensor-slider-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.sensor-slider{flex:1;-webkit-appearance:none;appearance:none;height:3px;
  background:rgba(0,212,255,0.2);border-radius:2px;outline:none;cursor:pointer;}
.sensor-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--c);cursor:grab;box-shadow:0 0 6px var(--c);}
.sensor-slider::-webkit-slider-thumb:active{cursor:grabbing;background:#fff;}
.slider-range{font-size:8px;color:var(--text2);font-family:var(--mono);white-space:nowrap;}
/* Control buttons */
.sensor-ctrl-btn{width:100%;padding:5px;background:rgba(0,212,255,0.08);
  border:1px solid rgba(0,212,255,0.2);color:var(--text2);font-family:var(--mono);
  font-size:9px;cursor:pointer;transition:all .2s;margin-top:3px;border-radius:1px;}
.sensor-ctrl-btn:hover{background:rgba(0,212,255,0.18);border-color:var(--c);color:var(--c);}
.sensor-ctrl-btn.tracking{background:rgba(0,255,136,0.15);border-color:var(--cg);color:var(--cg);animation:pulse 1s infinite;}
.press-btn{border-color:rgba(255,107,0,0.3);color:var(--ca);}
.press-btn:hover,.press-btn:active{background:rgba(255,107,0,0.2);border-color:var(--ca);}
#wire-tooltip{position:fixed;z-index:200;pointer-events:none;display:none;
  background:rgba(0,20,50,0.95);border:1px solid var(--border);padding:6px 10px;
  font-size:9px;letter-spacing:1px;}
#wire-cursor{position:fixed;z-index:200;pointer-events:none;display:none;
  width:14px;height:14px;border:2px solid var(--ca);border-radius:50%;transform:translate(-50%,-50%);
  box-shadow:0 0 8px var(--ca);}

/* CONTEXT MENU */
#ctx-menu{position:fixed;z-index:300;display:none;background:rgba(2,15,40,0.97);
  border:1px solid var(--border);min-width:160px;backdrop-filter:blur(12px);}
.ctx-item{padding:9px 16px;font-size:9px;letter-spacing:1px;cursor:pointer;transition:background .15s;}
.ctx-item:hover{background:rgba(0,212,255,0.1);}
.ctx-item.danger{color:var(--ca);}
.ctx-separator{height:1px;background:var(--border);margin:3px 0;}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:400;
  background:rgba(0,20,50,0.97);border:1px solid var(--c);padding:10px 20px;
  font-size:10px;letter-spacing:2px;display:none;pointer-events:none;}
</style>
</head>
<body>
<canvas id="mainCanvas"></canvas>
<div id="scanlines"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">J.A.R.V.I.S</div>
  <div id="subtitle">HOLOGRAPHIC ELECTRONICS LAB</div>
  <div id="sim-controls">
    <button class="ctrl-btn" id="btn-run" onclick="simRun()">▶ RUN</button>
    <button class="ctrl-btn" id="btn-pause" onclick="simPause()">⏸ PAUSE</button>
    <button class="ctrl-btn danger" id="btn-stop" onclick="simStop()">■ STOP</button>
    <div id="status-dot" title="Simulation status"></div>
    <div id="fps-counter">60fps</div>
    <div style="width:1px;height:24px;background:var(--border);margin:0 6px;"></div>
    <button class="ctrl-btn" id="btn-panels" onclick="toggleAllPanels()" title="Hide/Show UI panels">⊟ PANELS</button>
    <button class="ctrl-btn" id="btn-fs" onclick="toggleFullscreen()" title="Fullscreen">⛶ FULL</button>
  </div>
</div>

<!-- LEFT PANEL -->
<div id="left-panel">
  <div id="panel-title">COMPONENTS <button class="panel-toggle" onclick="toggleLeftPanel()">◀</button></div>
  <div id="comp-list"></div>
</div>

<!-- RIGHT PANEL -->
<div id="right-panel">
  <div id="prop-header">
    <div id="prop-title">SELECT A COMPONENT</div>
    <button class="panel-toggle" onclick="toggleRightPanel()">▶</button>
  </div>
  <div id="code-section">
    <div id="code-toolbar">
      <span>ARDUINO SKETCH</span>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="// Select an Arduino/ESP32 to edit code...
// Then click UPLOAD

void setup() {
  pinMode(13, OUTPUT);
}

void loop() {
  digitalWrite(13, HIGH);
  delay(500);
  digitalWrite(13, LOW);
  delay(500);
}"></textarea>
    <div id="upload-btn" onclick="uploadCode()">⚡ UPLOAD &amp; RUN</div>
  </div>
  <div id="prop-section" id="prop-section"></div>
</div>

<!-- BOTTOM PANEL -->
<div id="bottom-panel">
  <div id="bottom-resize" id="bottom-resize-handle"></div>
  <div id="bottom-tabs">
    <div class="btab active" id="tab-ai" onclick="switchTab('ai')">AI COMMAND</div>
    <div class="btab" id="tab-serial" onclick="switchTab('serial')">SERIAL MONITOR</div>
    <div class="btab" id="tab-sensors" onclick="switchTab('sensors')">LIVE SENSORS</div>
    <button id="bottom-collapse-btn" onclick="toggleBottomPanel()" title="Collapse/Expand">▼</button>
  </div>
  <div id="ai-console" class="active">
    <div id="ai-log"></div>
    <div id="thinking-indicator">◈ JARVIS IS THINKING...</div>
    <div id="ai-input-row">
      <input id="ai-input" placeholder="Tell JARVIS what to build... e.g. 'traffic light circuit'" onkeydown="aiInputKey(event)">
      <button id="ai-send" onclick="sendAICommand()">SEND</button>
    </div>
  </div>
  <div id="serial-monitor"><div class="ai-msg system">Serial monitor ready. Upload code to see output.</div></div>
  <div id="sensor-panel" style="display:none;flex:1;overflow-y:auto;padding:8px 12px;"></div>
</div>

<!-- NAV CONTROLS (trackpad-friendly) -->
<div id="nav-controls">
  <div class="nav-group">
    <button class="nav-btn" id="nav-up" title="Orbit Up">↑</button>
  </div>
  <div class="nav-group">
    <button class="nav-btn" id="nav-left" title="Orbit Left">←</button>
    <button class="nav-btn" id="nav-reset" title="Reset View" onclick="resetView()" style="font-size:10px;letter-spacing:0px;">⌂</button>
    <button class="nav-btn" id="nav-right" title="Orbit Right">→</button>
  </div>
  <div class="nav-group">
    <button class="nav-btn" id="nav-down" title="Orbit Down">↓</button>
  </div>
  <div class="nav-group" style="margin-top:2px;">
    <button class="nav-btn" id="nav-zoomin" title="Zoom In" onclick="orbit.radius=Math.max(5,orbit.radius-4);orbit.update()">+</button>
    <button class="nav-btn" id="nav-zoomout" title="Zoom Out" onclick="orbit.radius=Math.min(120,orbit.radius+4);orbit.update()">−</button>
  </div>
</div>

<!-- OVERLAYS -->
<div id="wire-tooltip"></div>
<div id="wire-cursor"></div>
<div id="ctx-menu"></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// JARVIS HOLOGRAPHIC ELECTRONICS LAB  
// Full simulation system with Arduino interpreter, 3D holographics, AI
// ═══════════════════════════════════════════════════════════════════════════

// ── GLOBALS ──────────────────────────────────────────────────────────────
const components = new Map(); // id → ComponentInstance
const wires = new Map();       // id → WireInstance
let selectedComp = null;
let hoveredPin = null;
let connectingPin = null; // active pin connection
let simRunning = false;
let frameCount = 0;
let lastFpsTime = performance.now();

// ── THREE.JS SETUP ────────────────────────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.5;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020810);
scene.fog = new THREE.FogExp2(0x020810, 0.018);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 28, 36);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── ORBIT CONTROLS (manual) ───────────────────────────────────────────────
const orbit = {
  theta: 0, phi: 0.72, radius: 46,
  target: new THREE.Vector3(0, 0, 0),
  dragging: false, lastX: 0, lastY: 0,
  panDragging: false,
  update() {
    const x = this.radius * Math.sin(this.phi) * Math.sin(this.theta);
    const y = this.radius * Math.cos(this.phi);
    const z = this.radius * Math.sin(this.phi) * Math.cos(this.theta);
    camera.position.set(this.target.x + x, this.target.y + y, this.target.z + z);
    camera.lookAt(this.target);
  }
};
orbit.update();

// ── LIGHTS ────────────────────────────────────────────────────────────────
const ambLight = new THREE.AmbientLight(0x020d1f, 2.5);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0x4080ff, 1.2);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);
const pointLight1 = new THREE.PointLight(0x00d4ff, 1.5, 60);
pointLight1.position.set(-10, 15, 0);
scene.add(pointLight1);
const pointLight2 = new THREE.PointLight(0x0040ff, 1.0, 60);
pointLight2.position.set(10, 10, -10);
scene.add(pointLight2);

// ── HOLOGRAPHIC ENVIRONMENT ───────────────────────────────────────────────
// Grid floor
const gridHelper = new THREE.GridHelper(100, 50, 0x003060, 0x001530);
gridHelper.position.y = -0.1;
scene.add(gridHelper);

// Secondary fine grid

const raycaster = new THREE.Raycaster();
const mouse2D = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);

function getMouseRay(e) {
  const rect = canvas.getBoundingClientRect();
  mouse2D.x = ((e.clientX - rect.left)/rect.width)*2 - 1;
  mouse2D.y = -((e.clientY - rect.top)/rect.height)*2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  return raycaster;
}

function raycastGround(e) {
  const r = getMouseRay(e);
  const pt = new THREE.Vector3();
  r.ray.intersectPlane(groundPlane, pt);
  return pt;
}

// ── PIN SYSTEM ────────────────────────────────────────────────────────────
class PinObject {
  constructor(parent, name, type, localPos, dir='io') {
    this.parent = parent; // ComponentInstance
    this.name = name;
    this.type = type; // 'digital','analog','power','ground','i2c_sda','i2c_scl','signal','pwm','io'
    this.dir = dir;   // 'input','output','io','power','ground'
    this.value = 0;   // 0-1 normalized
    this.connections = []; // connected PinObjects
    this.localPos = localPos.clone(); // position relative to component
    
    // 3D mesh
    this.mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 8, 8),
      MAT.pinMat()
    );
    this.mesh.userData.pin = this;
    this.mesh.userData.isPinMesh = true;
    parent.group.add(this.mesh);
    this.mesh.position.copy(localPos);
    
    // Glow sphere
    this.glowMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.35, 8, 8),
      MAT.glow(0x00d4ff, 0.0)
    );
    parent.group.add(this.glowMesh);
    this.glowMesh.position.copy(localPos);
  }
  
  worldPos() {
    const wp = new THREE.Vector3();
    this.mesh.getWorldPosition(wp);
    return wp;
  }
  
  setHighlight(mode) {
    if (mode === 'hover') {
      this.mesh.material = MAT.pinHover();
      this.glowMesh.material = MAT.glow(0x00d4ff, 0.25);
      this.mesh.scale.setScalar(1.4);
    } else if (mode === 'active') {
      this.mesh.material = MAT.pinActive();
      this.glowMesh.material = MAT.glow(0xff8800, 0.35);
      this.mesh.scale.setScalar(1.6);
    } else if (mode === 'connected') {
      this.glowMesh.material = MAT.glow(0x00ff88, 0.2);
      this.mesh.scale.setScalar(1.0);
    } else {
      this.mesh.material = MAT.pinMat();
      this.glowMesh.material = MAT.glow(0x00d4ff, 0.0);
      this.mesh.scale.setScalar(1.0);
    }
  }
  
  setValue(v) {
    this.value = Math.max(0, Math.min(1, v));
    // Propagate to connections
    for (const other of this.connections) {
      if (other.value !== this.value) {
        other.value = this.value;
        other.parent.onPinChange(other.name, this.value);
      }
    }
  }
  
  connect(other) {
    if (!this.connections.includes(other)) this.connections.push(other);
    if (!other.connections.includes(this)) other.connections.push(this);
    this.setHighlight('connected');
    other.setHighlight('connected');
  }
  
  disconnect(other) {
    this.connections = this.connections.filter(p=>p!==other);
    other.connections = other.connections.filter(p=>p!==this);
    if (this.connections.length === 0) this.setHighlight('');
    if (other.connections.length === 0) other.setHighlight('');
  }
}

// ── WIRE RENDERER ─────────────────────────────────────────────────────────
class Wire3D {
  constructor(pinA, pinB) {
    this.id = 'w_'+Math.random().toString(36).substr(2,8);
    this.pinA = pinA;
    this.pinB = pinB;
    this.mesh = null;
    this.active = false;
    this.build();
    pinA.connect(pinB);
    wires.set(this.id, this);
  }
  
  getColor() {
    const t = this.pinA.type;
    if (t === 'power') return 0xff3020;
    if (t === 'ground') return 0x606060;
    if (t === 'analog') return 0xffcc00;
    return 0x00d4ff;
  }
  
  build() {
    if (this.mesh) { scene.remove(this.mesh); this.mesh.geometry.dispose(); }
    const pA = this.pinA.worldPos();
    const pB = this.pinB.worldPos();
    const mid = new THREE.Vector3().lerpVectors(pA, pB, 0.5);
    mid.y += Math.max(2, pA.distanceTo(pB) * 0.3);
    const curve = new THREE.CatmullRomCurve3([pA, mid, pB]);
    const geo = new THREE.TubeGeometry(curve, 20, 0.07, 6, false);
    const mat = new THREE.MeshStandardMaterial({
      color: this.getColor(),
      emissive: this.getColor(),
      emissiveIntensity: 0.4,
      metalness: 0.5, roughness: 0.3
    });
    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.userData.wire = this;
    this.mesh.userData.isWire = true;
    scene.add(this.mesh);
  }
  
  update() {
    // Rebuild if positions changed
    this.build();
    // Animate based on signal
    const v = Math.max(this.pinA.value, this.pinB.value);
    this.mesh.material.emissiveIntensity = 0.2 + v * 0.8;
    this.active = v > 0.01;
  }
  
  remove() {
    if (this.mesh) scene.remove(this.mesh);
    this.pinA.disconnect(this.pinB);
    wires.delete(this.id);
  }
}

// ── COMPONENT BASE ────────────────────────────────────────────────────────
class ComponentInstance {
  constructor(type, name, pos) {
    this.type = type;
    this.name = name;
    this.id = 'c_'+Math.random().toString(36).substr(2,8);
    this.group = new THREE.Group();
    this.group.userData.component = this;
    this.group.userData.isComponent = true;
    this.group.position.set(pos.x, pos.y || 0, pos.z || 0);
    this.pins = {}; // name → PinObject
    this.state = {};
    this.simulator = null; // ArduinoSim if applicable
    scene.add(this.group);
    components.set(this.id, this);
    
    // Glow mesh (outer)
    this.selected = false;
  }
  
  addPin(name, type, localPos, dir='io') {
    const pin = new PinObject(this, name, type, localPos, dir);
    this.pins[name] = pin;
    return pin;
  }
  
  getPin(name) { return this.pins[name]; }
  
  onPinChange(pinName, value) { /* Override */ }
  
  setSelected(sel) {
    this.selected = sel;
    this.updateGlow();
  }
  
  updateGlow() { /* Override */ }
  
  getAllMeshes() {
    const meshes = [];
    this.group.traverse(obj => { if (obj.isMesh) meshes.push(obj); });
    return meshes;
  }
  
  getProperties() { return { type: this.type, name: this.name }; }
  
  remove() {
    scene.remove(this.group);
    // Disconnect all pins
    for (const pin of Object.values(this.pins)) {
      const conns = [...pin.connections];
      for (const other of conns) pin.disconnect(other);
    }
    // Remove associated wires
    for (const [wid, wire] of wires) {
      if (wire.pinA.parent === this || wire.pinB.parent === this) wire.remove();
    }
    if (this.simulator) this.simulator.stop();
    components.delete(this.id);
  }
  
  tick(dt) { /* Override: called each simulation frame */ }
}

    // Leads
    const anode = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,1.2,6), MAT.gold());
    anode.position.set(0.1, -0.6, 0); this.group.add(anode);
    const cathode = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,1.1,6), MAT.gold());
    cathode.position.set(-0.1, -0.55, 0); this.group.add(cathode);
    
    // Point light (emits when on)
    this.light = new THREE.PointLight(c.light, 0, 8);
    this.light.position.y = 1.2;
    this.group.add(this.light);
    
    // Glow sphere
    this.glowBall = new THREE.Mesh(new THREE.SphereGeometry(0.45,12,12), MAT.glow(c.light, 0.0));
    this.glowBall.position.y = 1.0;
    this.group.add(this.glowBall);
  }
  
  buildPins() {
    this.addPin('anode',   'digital', new THREE.Vector3(0.1, -1.2, 0), 'input');
    this.addPin('cathode', 'ground',  new THREE.Vector3(-0.1, -1.1, 0), 'ground');
  }
  
  onPinChange(pinName, value) {
    if (pinName === 'anode') this.setBrightness(value);
  }
  
  setBrightness(v) {
    this.state.brightness = v;
    const c = this.getColors();
    const e = new THREE.Color(c.emissive);
    const b = new THREE.Color(c.body);
    this.bodyMat.emissive.lerpColors(new THREE.Color(0), e, v);
    this.bodyMat.emissive.lerp(new THREE.Color(c.body), v*0.5);
    this.bodyMat.color.lerpColors(b, new THREE.Color(0xffffff), v*0.3);
    this.light.intensity = v * 2.5;
    this.glowBall.material.opacity = v * 0.3;
  }
  
  updateGlow() {}
  getProperties() { return { type:'LED', name:this.name, color:this.ledColor, brightness: (this.state.brightness*100).toFixed(0)+'%' }; }
  tick(dt) {
    // Smooth brightness
    const anodePin = this.pins['anode'];
    if (anodePin) this.setBrightness(anodePin.value);
  }
}

// ── RESISTOR ──────────────────────────────────────────────────────────────
class Resistor extends ComponentInstance {
  constructor(name, pos, ohms) {
    super('resistor', name, pos);
    this.ohms = ohms || 220;
    this.buildMesh();
    this.buildPins();
  }
  
  getBands() {
    const bandColors = [0x111111,0x8B4513,0xff0000,0xff8c00,0xffff00,0x228b22,0x0000ff,0x8b008b,0x808080,0xffffff];
    const v = this.ohms;
    if (v < 10) return [bandColors[0], bandColors[v], bandColors[0]];
    const d1 = Math.floor(v/100) % 10;
    const d2 = Math.floor(v/10) % 10;
    const mult = Math.floor(Math.log10(v)) - 1;
    return [bandColors[d1]||bandColors[0], bandColors[d2]||bandColors[0], bandColors[Math.max(0,mult)]||bandColors[0]];
  }
  
  buildMesh() {
    const bands = this.getBands();
    // Ceramic body
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,1.2,10), MAT.ceramic());
    body.rotation.z = Math.PI/2;
    this.group.add(body);
    // Color bands
    const bPos = [-0.35, 0, 0.35];
    for (let i = 0; i < 3; i++) {
      const band = new THREE.Mesh(new THREE.CylinderGeometry(0.19,0.19,0.12,10),
        new THREE.MeshStandardMaterial({color:bands[i]}));
      band.rotation.z = Math.PI/2;
      band.position.x = bPos[i];
      this.group.add(band);
    }
    // Leads
    const lead1 = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,1.2,6),MAT.metal());
    lead1.rotation.z = Math.PI/2; lead1.position.x = -1.2;
    this.group.add(lead1);
    const lead2 = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,1.2,6),MAT.metal());
    lead2.rotation.z = Math.PI/2; lead2.position.x = 1.2;
    this.group.add(lead2);
  }
  
  buildPins() {
    this.addPin('pin1', 'digital', new THREE.Vector3(-1.8, 0, 0));
    this.addPin('pin2', 'digital', new THREE.Vector3(1.8, 0, 0));
  }
  
  onPinChange(pinName, value) {
    // Pass signal through (resistors pass signal with slight loss)
    if (pinName === 'pin1') this.pins['pin2'].setValue(value * 0.98);
    else this.pins['pin1'].setValue(value * 0.98);
  }
  
  updateGlow() {}
  getProperties() { return { type:'Resistor', name:this.name, resistance: this.ohms+'Ω' }; }
}

// ── LCD 16x2 ──────────────────────────────────────────────────────────────
class LCD16x2 extends ComponentInstance {
  constructor(name, pos) {
    super('lcd', name, pos);
    this.displayData = ['                ','                ']; // 16 chars × 2 rows
    this.cursorCol = 0; this.cursorRow = 0;
    this.buildMesh();
    this.buildPins();
    this.buildScreen();
  }
  
  buildMesh() {
    // PCB
    const pcb = new THREE.Mesh(new THREE.BoxGeometry(8.0, 0.2, 3.6), MAT.pcbBlue());
    this.group.add(pcb);
    // Display bezel
    const bezel = new THREE.Mesh(new THREE.BoxGeometry(6.8, 0.22, 2.8),
      new THREE.MeshStandardMaterial({color:0x001a40, roughness:0.9}));
    bezel.position.y = 0.21;
    this.group.add(bezel);
    // Screen area
    this.screenMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(6.2, 2.3),
      new THREE.MeshBasicMaterial({color:0x003300})
    );
    this.screenMesh.rotation.x = -Math.PI/2;
    this.screenMesh.position.set(0, 0.33, 0);
    this.group.add(this.screenMesh);
    
    // Backlight glow
    this.backlight = new THREE.PointLight(0x00ff40, 0, 6);
    this.backlight.position.set(0, 1, 0);
    this.group.add(this.backlight);
    
    this.glowMesh = new THREE.Mesh(new THREE.BoxGeometry(8.4, 0.5, 4.0), MAT.glow(0x00ff40, 0.04));
    this.group.add(this.glowMesh);
  }
  
  buildScreen() {
    // Create canvas texture for the LCD screen
    this.screenCanvas = document.createElement('canvas');
    this.screenCanvas.width = 320; this.screenCanvas.height = 100;
    this.screenCtx = this.screenCanvas.getContext('2d');
    this.screenTex = new THREE.CanvasTexture(this.screenCanvas);
    this.screenMesh.material = new THREE.MeshBasicMaterial({map:this.screenTex});
    this.updateScreenTexture();
  }
  
  updateScreenTexture() {
    const ctx = this.screenCtx;
    ctx.fillStyle = '#003300';
    ctx.fillRect(0,0,320,100);
    ctx.fillStyle = '#00ff40';
    ctx.font = 'bold 28px monospace';
    const line1 = (this.displayData[0]||'').padEnd(16).substr(0,16);
    const line2 = (this.displayData[1]||'').padEnd(16).substr(0,16);
    ctx.fillText(line1, 10, 38);
    ctx.fillText(line2, 10, 78);
    this.screenTex.needsUpdate = true;
    this.backlight.intensity = 1.5;
  }
  
  buildPins() {
    this.addPin('VCC','power',new THREE.Vector3(-3.5, 0.2, 2.2),'power');
    this.addPin('GND','ground',new THREE.Vector3(-2.9, 0.2, 2.2),'ground');
    this.addPin('SDA','i2c_sda',new THREE.Vector3(-2.3, 0.2, 2.2));
    this.addPin('SCL','i2c_scl',new THREE.Vector3(-1.7, 0.2, 2.2));
    this.addPin('A','power',new THREE.Vector3(2.9, 0.2, 2.2),'power');
    this.addPin('K','ground',new THREE.Vector3(3.5, 0.2, 2.2),'ground');
  }
  
  // Called by LCD library simulation
  setLine(row, text) {
    if (row === 0 || row === 1) {
      this.displayData[row] = text;
      this.updateScreenTexture();
    }
  }
  
  setCursor(col, row) { this.cursorCol = col; this.cursorRow = row; }
  
  print(text) {
    let s = String(text);
    let row = this.cursorRow || 0;
    let col = this.cursorCol || 0;
    for (const ch of s) {
      let line = (this.displayData[row]||'').padEnd(16,' ').split('');
      if (col < 16) line[col] = ch;
      this.displayData[row] = line.join('');
      col++;
      if (col >= 16) { col = 0; row = (row+1)%2; }
    }
    this.cursorCol = col; this.cursorRow = row;
    this.updateScreenTexture();
  }
  
  clear() {
    this.displayData = ['                ','                '];
    this.cursorCol = 0; this.cursorRow = 0;
    this.updateScreenTexture();
  }
  
  onPinChange(pin, val) {}
  updateGlow() {
    if (!this.glowMesh) return;
    this.glowMesh.material.opacity = this.selected ? 0.12 : 0.04;
  }
  getProperties() { return { type:'LCD 16×2', name:this.name, interface:'I2C', address:'0x27', chars:'16×2' }; }
}

    this.addPin('signal', 'signal', new THREE.Vector3(-1.5, -0.8, 0.7));
    this.addPin('VCC', 'power', new THREE.Vector3(-1.5, -0.8, 0.3), 'power');
    this.addPin('GND', 'ground', new THREE.Vector3(-1.5, -0.8, -0.1), 'ground');
  }
  
  onPinChange(pinName, value) {
    if (pinName === 'signal') {
      // PWM value 0-1 → angle 0-180
      this.targetAngle = value * 180;
    }
  }
  
  updateGlow() {
    if (!this.glowMesh) return;
    this.glowMesh.material.opacity = this.selected ? 0.12 : 0.04;

  tick(dt) {
    // Smooth rotation
    const diff = this.targetAngle - this.angle;
    this.angle += diff * 0.1;
    if (this.shaft) this.shaft.rotation.y = (this.angle * Math.PI/180) - Math.PI/2;
  }
}

class Breadboard extends ComponentInstance {
  constructor(name, pos) {
    super('breadboard', name, pos);
    this.buildMesh();
    this.buildPins();
  }
  
  buildMesh() {
    // Main board
    const board = new THREE.Mesh(new THREE.BoxGeometry(16.5, 0.5, 5.4),
      new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.9}));
    this.group.add(board);
    // Power rails (red + blue)
    const redRail = new THREE.Mesh(new THREE.BoxGeometry(15.5,0.05,0.4),
      new THREE.MeshBasicMaterial({color:0xff2020}));
    redRail.position.set(0, 0.28, 2.3); this.group.add(redRail);
    const bluRail = new THREE.Mesh(new THREE.BoxGeometry(15.5,0.05,0.4),
      new THREE.MeshBasicMaterial({color:0x2020ff}));
    bluRail.position.set(0, 0.28, -2.3); this.group.add(bluRail);
    // Center divider
    const div = new THREE.Mesh(new THREE.BoxGeometry(15.5,0.1,0.15),
      new THREE.MeshStandardMaterial({color:0xdddddd}));
    div.position.y = 0.28; this.group.add(div);
    // Grid of holes (simplified visual)
    for (let r = 0; r < 2; r++) {
      for (let c = 0; c < 30; c++) {
        const hole = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,0.1,6),
          new THREE.MeshBasicMaterial({color:0x888888}));
        hole.position.set(-7.0 + c*0.5, 0.28, (r-0.5)*1.0);
        this.group.add(hole);
      }
    }
  }
  
  buildPins() {
    // Power rails
    this.addPin('+V', 'power', new THREE.Vector3(-7.5, 0.6, 2.3), 'power');
    this.addPin('-V', 'ground', new THREE.Vector3(-7.5, 0.6, -2.3), 'ground');
    // Row pins (a1, b1, etc.) - just add a subset
    for (let col = 1; col <= 10; col++) {
      const x = -7.0 + (col-1)*0.5;
      this.addPin(`a${col}`, 'digital', new THREE.Vector3(x, 0.6, -0.5));
      this.addPin(`b${col}`, 'digital', new THREE.Vector3(x, 0.6, 0.5));
    }
  }
  
  onPinChange(pin, val) {
    // Row connections: a1-e1 connected, f1-j1 connected
    const match = pin.match(/^([a-e]|[f-j])(\d+)$/);
    if (match) {
      const row = match[1]; const col = match[2];
      const group = 'abcde'.includes(row) ? 'abcde' : 'fghij';
      for (const ch of group) {
        const other = this.pins[ch+col];
        if (other && ch !== row) other.setValue(val);
      }
    }
  }
  
  updateGlow() {}
  getProperties() { return { type:'Breadboard', name:this.name, points:'830', rows:'63' }; }
}

  onPinChange(pin, val) {
    this.state[pin.toLowerCase()] = val;
    // Drive motor A
    if (this.state.in1 > 0.5 && this.state.in2 < 0.5) {
      this.pins['OUT1'].setValue(this.state.ena);
      this.pins['OUT2'].setValue(0);
    } else if (this.state.in2 > 0.5 && this.state.in1 < 0.5) {
      this.pins['OUT1'].setValue(0);
      this.pins['OUT2'].setValue(this.state.ena);
    }

// ── ARDUINO SIMULATOR ─────────────────────────────────────────────────────
class ArduinoSimulator {
  constructor(board) {
    this.board = board;
    this.running = false;
    this.startTime = 0;
    this.loopGen = null;
    this.pendingDelay = 0;
    this.delayEndTime = 0;
    this.serialCallback = null;
    this.serialLines = [];
    this.pinModes = {};
    this.pinValues = {};
    this.i2cDevices = {}; // addr → component
    this._wireAddr = 0;
    this._wireBuffer = [];
    
    // I2C LCD instance ref
    this._lcdRef = null;
    this._dhtRef = null;
    this._ultraRef = null;
  }
  
  findConnectedComponent(pinName, types) {
    const pin = this.board.pins[pinName];
    if (!pin) return null;
    for (const connPin of pin.connections) {
      if (types.includes(connPin.parent.type)) return connPin.parent;
    }
    return null;
  }
  
  // Called before each upload to scan connected components
  scanComponents() {
    // Find LCD
    const sdaPin = this.board.pins['D18'] || this.board.pins['A4'];
    if (sdaPin) {
      for (const conn of (sdaPin.connections || [])) {
        if (conn.parent.type === 'lcd') { this._lcdRef = conn.parent; break; }
      }
    }
    // Also check all pins for LCD/DHT/Ultra
    for (const [pname, pin] of Object.entries(this.board.pins)) {
      for (const conn of pin.connections) {
        if (conn.parent.type === 'lcd') this._lcdRef = conn.parent;
        if (conn.parent.type === 'dht11') this._dhtRef = conn.parent;
        if (conn.parent.type === 'ultrasonic') this._ultraRef = conn.parent;
      }
    }
  }
  
  transpile(code) {
    let js = code;
    
    // Remove #include lines
    js = js.replace(/#include\s+[<"][^>"]*[>"]/gm, '');
    
    // #define to const
    js = js.replace(/#define\s+(\w+)\s+(.*)/gm, (m, name, val) => {
      val = val.trim();
      const num = Number(val);
      return isNaN(num) ? `const ${name} = ${JSON.stringify(val)};` : `const ${name} = ${num};`;
    });
    
    // Type casting — remove cast expressions like (int), (float) etc.
    js = js.replace(/\(\s*(int|float|double|long|byte|unsigned\s+int|uint8_t|uint16_t)\s*\)\s*/g, '');
    
    // Variable declarations — multi-word types first (order matters!)
    js = js.replace(/\b(unsigned\s+long|unsigned\s+int|unsigned\s+char|unsigned\s+long\s+int)\s+(?=\w)/g, 'var ');
    // Single-word primitive types
    js = js.replace(/(?<!var\s)\b(int|long|float|double|char|byte|boolean|bool|uint8_t|uint16_t|uint32_t|int8_t|int16_t|int32_t)\s+(?=\w)/g, 'var ');
    // String type → var (only as declaration before identifier, not function call)
    js = js.replace(/\bString\s+(?=[a-zA-Z_])/g, 'var ');
    
    // Custom/library object declarations — handles BOTH UpperCase and camelCase library types
    // e.g. "Scheduler userScheduler;" or "painlessMesh mesh;" or "Adafruit_SSD1306 display(w,h,&Wire,rst);"
    const _libAliasMap = {
      painlessMesh:'_painlessMesh', Scheduler:'_Scheduler', Task:'_Task',
      Adafruit_SSD1306:'_Adafruit_SSD1306', Adafruit_GFX:'_Adafruit_GFX',
      Adafruit_ST7735:'_Adafruit_ST7735', Adafruit_NeoPixel:'_Adafruit_NeoPixel',
      U8G2_SSD1306_128X64_NONAME_F_HW_I2C:'_U8G2_SSD1306_128X64_NONAME_F_HW_I2C',
      U8G2_SSD1306_128X64_NONAME_1_HW_I2C:'_U8G2_SSD1306_128X64_NONAME_F_HW_I2C',
      LiquidCrystal_I2C:'_LCD', DHT:'_DHT', NewPing:'_NewPing', Servo:'_Servo',
      IRrecv:'_IRrecv', IRsend:'_IRsend', SoftwareSerial:'_SoftwareSerial',
      TinyGPSPlus:'_TinyGPSPlus', MFRC522:'_MFRC522', AccelStepper:'_AccelStepper',
      Stepper:'_AccelStepper', StaticJsonDocument:'_StaticJsonDocument',
      DynamicJsonDocument:'_DynamicJsonDocument', RTC_DS3231:'_RTC_DS3231',
      RTC_DS1307:'_RTC_DS3231', DateTime:'_DateTime',
    };
    const _skipWords = new Set(['var','let','const','function','return','if','else','for','while','do','switch','case','break','continue','new','true','false','null','undefined','typeof','instanceof','in','of','void','delete','throw','try','catch','finally','class','extends','import','export','default','yield','async','await','static','get','set','super']);
    const _primitives = new Set(['int','long','float','double','char','byte','bool','boolean','uint8_t','uint16_t','uint32_t','int8_t','int16_t','int32_t','unsigned','signed','void','auto']);

    // Bare declaration: TypeName varName;  → var varName = new _Type();
    js = js.replace(/\b([A-Za-z_][A-Za-z0-9_]*(?:<[^>]*>)?)\s+([a-z_][a-zA-Z0-9_]*)\s*;/g, (m, type, varname) => {
      if (_skipWords.has(type) || _primitives.has(type)) return m;
      const cls = _libAliasMap[type];
      if (cls) return `var ${varname} = new ${cls}();`;
      // Unknown type — create a safe proxy object so method calls don't throw
      return `var ${varname} = (typeof ${type} === 'function') ? new ${type}() : (typeof _${type} === 'function' ? new _${type}() : {setDebugMsgTypes:function(){},init:function(){},update:function(){},begin:function(){return true;},read:function(){return 0;},write:function(){},print:function(v){},println:function(v){}});`;
    });

    // Constructor call: TypeName varName(args);  → var varName = new _Type(cleanArgs);
    js = js.replace(/\b([A-Za-z_][A-Za-z0-9_]*)\s+([a-z_][a-zA-Z0-9_]*)\s*\(([^;{]*)\)\s*;/g, (m, type, varname, args) => {
      if (_skipWords.has(type) || _primitives.has(type)) return m;
      const cls = _libAliasMap[type] || `(typeof _${type} === 'function' ? _${type} : typeof ${type} === 'function' ? ${type} : Object)`;
      const cleanArgs = args.replace(/&/g,'').trim();
      return `var ${varname} = new ${cls}(${cleanArgs});`;
    });
    
    // Task macro shorthand: TASK_SECOND etc already handled as #define
    // Remove callback pointer syntax: &functionName → functionName
    js = js.replace(/&([a-zA-Z_]\w*)/g, '$1');
    
    // Clean up any accidental double-var
    js = js.replace(/\bvar\s+var\s+/g, 'var ');
    
    // void functions → regular functions
    js = js.replace(/\bvoid\s+(\w+)\s*\(/g, 'function $1(');

    // Function parameters: strip declaration leftovers from typed C/C++ args
    // e.g. function cb(var from, var msg) -> function cb(from, msg)
    const cleanFunctionParams = (rawParams) => {
      const params = rawParams.trim();
      if (!params) return '';

      const parts = [];
      let cur = '';
      let depth = 0;
      for (const ch of params) {
        if (ch === '(' || ch === '[' || ch === '<') depth++;
        if (ch === ')' || ch === ']' || ch === '>') depth = Math.max(0, depth - 1);
        if (ch === ',' && depth === 0) {
          parts.push(cur);
          cur = '';
          continue;
        }
        cur += ch;
      }
      if (cur.trim()) parts.push(cur);

      return parts.map((part, idx) => {
        let p = part.trim();
        if (!p) return `arg${idx}`;
        p = p.replace(/=[^,]*$/g, '').trim();
        p = p.replace(/\b(const|volatile|static|register)\b/g, '').trim();
        p = p.replace(/[&*]/g, ' ').trim();
        p = p.replace(/^\b(var|let|const)\b\s+/, '').trim();

        let name = p.split(/\s+/).filter(Boolean).pop() || `arg${idx}`;
        name = name.replace(/\[\]$/,'');
        if (!/^[A-Za-z_$][\w$]*$/.test(name)) {
          name = name.replace(/[^A-Za-z0-9_$]/g, '') || `arg${idx}`;
        }
        return name;
      }).join(', ');
    };

    js = js.replace(/function\s+([A-Za-z_]\w*)\s*\(([^)]*)\)\s*\{/g, (m, fnName, rawParams) => {
      return `function ${fnName}(${cleanFunctionParams(rawParams)}) {`;
    });

    
    // Make setup/loop generators
    js = js.replace(/function setup\s*\(\s*\)/, 'function* setup()');
    js = js.replace(/function loop\s*\(\s*\)/, 'function* loop()');
    
    // delay/delayMicroseconds → yield
    js = js.replace(/\bdelay\s*\(([^)]+)\)/g, 'yield ($1)');
    js = js.replace(/\bdelayMicroseconds\s*\(([^)]+)\)/g, 'yield (Math.ceil(($1)/1000))');
    
    // Array declarations: var name[N] → var name = new Array(N).fill(0)
    js = js.replace(/var\s+(\w+)\s*\[(\d+)\]/g, 'var $1 = new Array($2).fill(0)');
    
    return js;
  }
  
  buildSandbox() {
    const sim = this;
    
    // Servo class
    class _Servo {
      constructor() { this._pin=-1; this._angle=90; this._comp=null; }

  _pinName(pin) {
    if (pin >= 14) return `A${pin-14}`;
    return `D${pin}`;
  }
  
  _map(x, a, b, c, d) { return (x - a) * (d - c) / (b - a) + c; }
  
  millis() { return this.running ? Date.now() - this.startTime : 0; }
  pinMode(pin, mode) { this.pinModes[pin] = mode; }
  digitalWrite(pin, value) {
    const v = (value === 1 || value === true || value > 0) ? 1 : 0;
    this.pinValues[pin] = v;
    const pname = this._pinName(pin);
    const boardPin = this.board.pins[pname];
    if (boardPin) boardPin.setValue(v);
  }
  digitalRead(pin) {
    const pname = this._pinName(pin);
    const boardPin = this.board.pins[pname];
    if (!boardPin) return 0;
    return boardPin.value > 0.5 ? 1 : 0;
  }
  analogWrite(pin, value) {
    const v = Math.max(0, Math.min(255, value)) / 255;
    this.pinValues[pin] = v;
    const pname = this._pinName(pin);
    const boardPin = this.board.pins[pname];
    if (boardPin) boardPin.setValue(v);
  }
  analogRead(pin) {
    const pname = this._pinName(pin);
    const boardPin = this.board.pins[pname];
    if (!boardPin) return 0;
    for (const conn of boardPin.connections) {
      if (conn.parent.type === 'potentiometer') return Math.round(conn.parent.value * 1023);
    }
    return Math.round(boardPin.value * 1023);
  }

  // Arduino hardware API
  get Serial() {
    const sim = this;
    return {
      begin: (baud) => {},
      print: (v) => sim._serial(String(v)),
      println: (v) => { sim._serial(String(v)); sim._serial('\n'); },
      available: () => 0, read: ()=>-1, write:(v)=>{},
      flush: ()=>{}
    };
  }
  
  _serial(text) {
    // Rate limit: max 300 serial lines total, then warn and stop
    if (this._serialLineCount === undefined) this._serialLineCount = 0;
    if (this._serialLineCount > 300) {
      if (this._serialLineCount === 301) {
        if (this.serialCallback) this.serialCallback('[Serial output limit reached — pausing]\n');
      }
      this._serialLineCount++;
      return;
    }
    this._serialLineCount++;
    if (this.serialCallback) this.serialCallback(text);
    this.serialLines.push(text);
  }

  tick() {
    if (!this.running || !this._loopFn) return;
    
    // Pending delay
    if (this.delayEndTime > 0) {
      if (Date.now() < this.delayEndTime) return;
      this.delayEndTime = 0;
    }
    
    if (!this.loopGen) this.loopGen = this._loopFn();
    
    // Run steps per tick
    let steps = 50;
    while (steps-- > 0) {
      let r;
      try { r = this.loopGen.next(); }
      catch(e) {
        // STOP completely — don't restart the loop or spam errors
        serialLog('[' + this.board.name + '] Runtime error: ' + e.message, 'error');
        serialLog('[' + this.board.name + '] Simulation halted. Fix code and re-upload.', 'error');
        this.running = false;
        this.loopGen = null;
        updateStatusDot('error');
        return;
      }
      
      if (r.done) {
        // Loop finished one iteration — restart it
        this.loopGen = this._loopFn();
        return;
      }
      
      if (typeof r.value === 'number' && r.value > 0) {
        this.delayEndTime = Date.now() + r.value;
        return;
      }
    }
  }

  upload(code) {
    this.stop();
    this._serialLineCount = 0;
    this.scanComponents();
    const transpiled = this.transpile(code);
    const sandbox = this.buildSandbox();
    
    try {
      const keys = Object.keys(sandbox);
      const vals = Object.values(sandbox);
      
      // Build function with sandbox
      const fn = new Function(...keys, `
        "use strict";
        // Core library aliases — bare name → _prefixed class
        var Servo                  = _Servo;
        var LiquidCrystal_I2C      = _LCD;
        var DHT                    = _DHT;
        var NewPing                = _NewPing;
        var Adafruit_SSD1306       = _Adafruit_SSD1306;
        var Adafruit_GFX           = _Adafruit_GFX;
        var Adafruit_ST7735        = _Adafruit_ST7735;
        var Adafruit_NeoPixel      = _Adafruit_NeoPixel;
        var U8G2_SSD1306_128X64_NONAME_F_HW_I2C = _U8G2_SSD1306_128X64_NONAME_F_HW_I2C;
        var U8G2_SSD1306_128X64_NONAME_1_HW_I2C = _U8G2_SSD1306_128X64_NONAME_F_HW_I2C;
        var U8G2_SSD1306_128X32_UNIVISION_F_HW_I2C = _U8G2_SSD1306_128X64_NONAME_F_HW_I2C;
        var IRrecv                 = _IRrecv;
        var IRsend                 = _IRsend;
        var decode_results         = _decode_results;
        var SoftwareSerial         = _SoftwareSerial;
        var TinyGPSPlus            = _TinyGPSPlus;
        var MFRC522                = _MFRC522;
        var AccelStepper           = _AccelStepper;
        var Stepper                = _AccelStepper;
        var Scheduler              = _Scheduler;
        var Task                   = _Task;
        var painlessMesh           = _painlessMesh;
        var StaticJsonDocument     = _StaticJsonDocument;
        var DynamicJsonDocument    = _DynamicJsonDocument;
        var RTC_DS3231             = _RTC_DS3231;
        var RTC_DS1307             = _RTC_DS3231;
        var DateTime               = _DateTime;
        // Catch-all: any unknown constructor call returns a safe mock object
        ${transpiled}
        return {
          setup: typeof setup !== 'undefined' ? setup : null,
          loop:  typeof loop  !== 'undefined' ? loop  : null
        };
      `);
      
      const result = fn(...vals);
      this._setupFn = result.setup;
      this._loopFn = result.loop;
      
      this.running = true;
      this.startTime = Date.now();
      
      // Run setup (drain generator)
      if (this._setupFn) {
        const gen = this._setupFn();
        let r; let limit = 10000;
        do { r = gen.next(); limit--; } while (!r.done && limit > 0);
      }
      
      this.loopGen = null;
      serialLog('[' + this.board.name + '] Uploaded & running', 'info');
      updateStatusDot('running');
      return true;
      
    } catch(e) {
      serialLog('[' + this.board.name + '] Error: ' + e.message, 'error');
      updateStatusDot('error');
      return false;
    }
  }
  
  tick() {
    if (!this.running || !this._loopFn) return;
    
    // Pending delay
    if (this.delayEndTime > 0) {
      if (Date.now() < this.delayEndTime) return;
      this.delayEndTime = 0;
    }
    
    if (!this.loopGen) this.loopGen = this._loopFn();
    
    // Run a few steps per tick (to not block UI)
    let steps = 50;
    while (steps-- > 0) {
      let r;
      try { r = this.loopGen.next(); }
      catch(e) {
        serialLog('[' + this.board.name + '] Runtime: ' + e.message, 'error');
        this.loopGen = null; return;
      }
      
      if (r.done) {
        this.loopGen = this._loopFn();
        return;
      }
      
      if (typeof r.value === 'number' && r.value > 0) {
        this.delayEndTime = Date.now() + r.value;
        return;
      }
      // yield 0 or undefined → continue
    }
  }
  
  stop() {
    this.running = false;
    this.loopGen = null;
    this.delayEndTime = 0;
  }
}

// ── COMPONENT FACTORY ─────────────────────────────────────────────────────
let compCounter = {};
function createComponent(type, pos, options={}) {
  compCounter[type] = (compCounter[type]||0)+1;
  const name = options.name || (type+'_'+compCounter[type]);
  const def = COMPONENT_LIBRARY.find(d=>d.type===type);
  if (!def) return null;
  
  let comp;
  switch(type) {
    case 'arduino_uno': comp = new ArduinoUno(name, pos); break;
    case 'esp32': comp = new ESP32(name, pos); break;
    case 'led': comp = new LEDComponent(name, pos, options.ledColor||'red'); break;
    case 'resistor': comp = new Resistor(name, pos, options.ohms||220); break;
    case 'lcd': comp = new LCD16x2(name, pos); break;
    case 'servo': comp = new ServoMotor(name, pos); break;
    case 'button': comp = new PushButton(name, pos); break;
    case 'potentiometer': comp = new Potentiometer(name, pos); break;
    case 'dht11': comp = new DHT11(name, pos); break;
    case 'ultrasonic': comp = new Ultrasonic(name, pos); break;
    case 'breadboard': comp = new Breadboard(name, pos); break;
    case 'l298n': comp = new L298N(name, pos); break;
    default: return null;
  }
  
  showToast('Added: '+name, 1500);
  return comp;
}

function addComponentFromLibrary(defOrType) {
  const type = typeof defOrType === 'string' ? defOrType : defOrType.type;
  const offset = components.size * 0.5;
  const pos = new THREE.Vector3((Math.random()-0.5)*10 + offset, 0, (Math.random()-0.5)*8 + offset);
  // Dynamic component?
  if (dynamicComponents[type]) {
    const def = COMPONENT_LIBRARY.find(c=>c.type===type);
    const name = (def?.name||type).replace(/\s+/g,'_') + '_' + (components.size+1);
    const comp = new dynamicComponents[type](name, pos);
    comp.group.position.copy(pos);
    scene.add(comp.group);
    components.set(comp.id, comp);
    selectComponent(comp);
    return;
  }
  createComponent(type, {x:pos.x,y:0,z:pos.z});
}

// ── MOUSE & INTERACTION ───────────────────────────────────────────────────
let isDraggingComp = false;
let dragComp = null;
let dragOffset = new THREE.Vector3();
let isOrbiting = false;
let isPanning = false;

function getAllPickable() {
  const meshes = [];
  for (const comp of components.values()) {
    comp.group.traverse(obj => { if (obj.isMesh) meshes.push(obj); });
  }
  return meshes;
}

function getPinAt(e) {
  const r = getMouseRay(e);
  const pinMeshes = [];
  for (const comp of components.values()) {
    for (const pin of Object.values(comp.pins)) {
      pinMeshes.push(pin.mesh);
      pinMeshes.push(pin.glowMesh);
    }
  }
  const hits = r.intersectObjects(pinMeshes);
  if (hits.length > 0 && hits[0].object.userData.isPinMesh) {
    return hits[0].object.userData.pin;
  }
  return null;
}

function getCompAt(e) {
  const r = getMouseRay(e);
  const meshes = getAllPickable();
  const hits = r.intersectObjects(meshes);
  for (const hit of hits) {
    let obj = hit.object;
    while (obj && !obj.userData.isComponent) obj = obj.parent;
    if (obj && obj.userData.isComponent) return obj.userData.component;
  }
  return null;
}

// ── MOUSE EVENTS (trackpad-friendly) ─────────────────────────────────────
let mouseDownX = 0, mouseDownY = 0, mouseDownTime = 0;
let mouseMoved = false;

canvas.addEventListener('mousedown', e => {
  if (e.target !== canvas) return;
  mouseDownX = e.clientX; mouseDownY = e.clientY;
  mouseDownTime = Date.now();
  mouseMoved = false;
  
  // Middle click OR Shift+left = pan
  if (e.button === 1 || (e.button === 0 && e.shiftKey)) {
    isPanning = true;
    orbit.lastX = e.clientX; orbit.lastY = e.clientY;
    canvas.style.cursor = 'move';
    return;
  }
  
  // Right click = orbit (also works as fallback)
  if (e.button === 2) {
    isOrbiting = true;
    orbit.lastX = e.clientX; orbit.lastY = e.clientY;
    return;
  }
  
  if (e.button === 0) {
    // Check pins first
    const pin = getPinAt(e);
    if (pin) {
      if (!connectingPin) {
        connectingPin = pin;
        pin.setHighlight('active');
        showToast('Click another pin to connect  •  ESC to cancel', 2500);
      } else {
        if (connectingPin !== pin && connectingPin.parent !== pin.parent) {
          new Wire3D(connectingPin, pin);
          showToast('Connected! ✓', 1500);
          connectingPin.setHighlight('connected');
        }
        connectingPin = null;
      }
      return;
    }
    
    // Cancel connection on empty click
    if (connectingPin) {
      connectingPin.setHighlight('');
      connectingPin = null;
      return;
    }
    
    // Check components
    const comp = getCompAt(e);
    if (comp) {
      if (comp.type === 'button') {
        comp.setPressed(true);
        window.addEventListener('mouseup', () => comp.setPressed(false), {once:true});
        return;
      }
      selectComponent(comp);
      isDraggingComp = true;
      dragComp = comp;
      const gpt = raycastGround(e);
      dragOffset.copy(gpt).sub(comp.group.position);
      canvas.style.cursor = 'grabbing';
    } else {
      // Check test subject before falling back to orbit
      if (testSubject) {
        const r2 = getMouseRay(e);
        const tsHits = r2.intersectObjects([testSubject.mesh, testSubject.glowMesh, testSubject.edges], true);
        if (tsHits.length > 0) {
          isDraggingTestSubject = true;
          testSubject.setDragging(true);
          canvas.style.cursor = 'grabbing';
          return;
        }
      }
      // Left drag on empty = orbit
      isOrbiting = true;
      orbit.lastX = e.clientX; orbit.lastY = e.clientY;
      canvas.style.cursor = 'grabbing';
    }
  }
});

canvas.addEventListener('mousemove', e => {
  const dx = Math.abs(e.clientX - mouseDownX);
  const dy = Math.abs(e.clientY - mouseDownY);
  if (dx > 3 || dy > 3) mouseMoved = true;
  
  // Wire preview cursor
  if (connectingPin) {
    const wc = document.getElementById('wire-cursor');
    wc.style.display = 'block';
    wc.style.left = e.clientX + 'px';
    wc.style.top = e.clientY + 'px';
  }
  
  if (isDraggingComp && dragComp) {
    const gpt = raycastGround(e);
    dragComp.group.position.x = gpt.x - dragOffset.x;
    dragComp.group.position.z = gpt.z - dragOffset.z;
    for (const wire of wires.values()) {
      if (wire.pinA.parent === dragComp || wire.pinB.parent === dragComp) wire.build();
    }
    return;
  }

  if (isDraggingTestSubject && testSubject) {
    const gpt = raycastGround(e);
    if (gpt) testSubject.group.position.set(gpt.x, 0, gpt.z);
    return;
  }
  
  if (isOrbiting) {
    const dx2 = e.clientX - orbit.lastX;
    const dy2 = e.clientY - orbit.lastY;
    orbit.theta -= dx2 * 0.008;
    orbit.phi = Math.max(0.12, Math.min(Math.PI*0.48, orbit.phi + dy2 * 0.008));
    orbit.lastX = e.clientX; orbit.lastY = e.clientY;
    orbit.update();
    return;
  }
  
  if (isPanning) {
    const dx2 = e.clientX - orbit.lastX;
    const dy2 = e.clientY - orbit.lastY;
    const right = new THREE.Vector3();
    const up = new THREE.Vector3(0,1,0);
    right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), up).normalize();
    orbit.target.addScaledVector(right, -dx2 * 0.04);
    orbit.target.addScaledVector(up, dy2 * 0.04);
    orbit.lastX = e.clientX; orbit.lastY = e.clientY;
    orbit.update();
    return;
  }
  
  // Hover highlight pins
  const pin = getPinAt(e);
  if (hoveredPin && hoveredPin !== pin && hoveredPin !== connectingPin) {
    hoveredPin.setHighlight(hoveredPin.connections.length > 0 ? 'connected' : '');
  }
  if (pin && pin !== connectingPin) {
    pin.setHighlight('hover');
    canvas.style.cursor = 'crosshair';
    const wt = document.getElementById('wire-tooltip');
    wt.style.display = 'block';
    wt.style.left = (e.clientX+14)+'px';
    wt.style.top = (e.clientY-10)+'px';
    wt.textContent = pin.parent.name + ' › ' + pin.name + ' [' + pin.type + ']';
  } else {
    document.getElementById('wire-tooltip').style.display = 'none';
    if (!isDraggingComp && !isOrbiting) {
      // Check if hovering component
      const comp = getCompAt(e);
      if (comp) {
        canvas.style.cursor = 'grab';
      } else if (testSubject) {
        const r3 = getMouseRay(e);
        const tsH = r3.intersectObjects([testSubject.mesh, testSubject.glowMesh], true);
        canvas.style.cursor = tsH.length > 0 ? 'grab' : 'default';
      } else {
        canvas.style.cursor = 'default';
      }
    }
  }
  hoveredPin = pin;
});

canvas.addEventListener('mouseup', e => {
  isDraggingComp = false;
  dragComp = null;
  isOrbiting = false;
  isPanning = false;
  if (isDraggingTestSubject && testSubject) testSubject.setDragging(false);
  isDraggingTestSubject = false;
  canvas.style.cursor = 'default';
  
  // Click without drag — deselect if on empty space
  if (!mouseMoved && e.button === 0) {
    const pin = getPinAt(e);
    const comp = getCompAt(e);
    if (!pin && !comp && !connectingPin) selectComponent(null);
  }
});

});

// Two-finger swipe = ORBIT, Shift+two-finger = PAN, pinch = ZOOM
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  
  if (e.ctrlKey) {
    // Pinch → zoom
    orbit.radius = Math.max(5, Math.min(120, orbit.radius + e.deltaY * 0.15));
    orbit.update();
  } else if (e.shiftKey) {
    // Shift + swipe → pan
    const right = new THREE.Vector3();
    const up = new THREE.Vector3(0,1,0);
    right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), up).normalize();
    const speed = orbit.radius * 0.002;
    orbit.target.addScaledVector(right, e.deltaX * speed);
    orbit.target.addScaledVector(up, -e.deltaY * speed);
    orbit.update();
  } else {
    // Two-finger swipe → orbit
    orbit.theta -= e.deltaX * 0.005;
    orbit.phi = Math.max(0.12, Math.min(Math.PI * 0.48, orbit.phi + e.deltaY * 0.005));
    orbit.update();
  }
}, { passive: false });

      showToast('Connection cancelled', 1000);

  // Delete key — remove selected component
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedComp) {
    // Don't delete if focus is on text input
    if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
    const id = selectedComp.id;
    selectComponent(null);
    removeComponent(id);
  }
  // F key — focus/reset view

});

  const navBtns = {
    'nav-up':    ()=>{ orbit.phi = Math.max(0.12, orbit.phi - 0.04); orbit.update(); },
    'nav-down':  ()=>{ orbit.phi = Math.min(Math.PI*0.48, orbit.phi + 0.04); orbit.update(); },
    'nav-left':  ()=>{ orbit.theta -= 0.04; orbit.update(); },
    'nav-right': ()=>{ orbit.theta += 0.04; orbit.update(); },
  };
  for (const [id, action] of Object.entries(navBtns)) {
    const el = document.getElementById(id);
    if (!el) continue;
    el.addEventListener('mousedown', (e) => { e.stopPropagation(); startNav(id, action); });
    el.addEventListener('mouseup', () => stopNav(id));

});
